<!DOCTYPE html>
<html>
<head>
    <title>Price History</title>
</head>
<body>
    <h1>Price History</h1>
    <table>
        <tr><th>Date</th><th>Price (Rs.)</th></tr>
        {% for date, price in date_price_pairs %}
        <tr>
            <td>{{ date }}</td>
            <td>{{ price }}</td>
        </tr>
        {% endfor %}
    </table>
    <a href="{{ url_for('home') }}">Back</a>
</body>
</html>
